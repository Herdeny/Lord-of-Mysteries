name: Documentation Consistency

on:
  push:
    branches:
      - main
      - master
    paths:
      - "project-status.json"
      - "roadmap.json"
      - "README.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - "VERSIONING.md"
      - "docs/**"
      - "wiki/**"
      - "scripts/sync_project_metadata.py"
      - "scripts/gen_datapack.py"
      - "scripts/import_v09_design.py"
      - "scripts/build_content_graph.py"
      - "scripts/check_resource_integrity.py"
      - "scripts/check_github_text_encoding.py"
      - "scripts/gen_pages_catalog.py"
      - "scripts/check_release_timestamp.py"
      - "scripts/check_m3_foundation.py"
      - "src/main/java/top/aurora/lordofmysteries/registry/ModItems.java"
      - "src/main/java/top/aurora/lordofmysteries/registry/ModBlocks.java"
      - "src/main/java/top/aurora/lordofmysteries/registry/ModEntities.java"
      - "src/main/resources/assets/lord_of_mysteries/lang/*.json"
      - "build.gradle"
      - ".github/workflows/docs-consistency.yml"
  pull_request:
    paths:
      - "project-status.json"
      - "roadmap.json"
      - "README.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - "VERSIONING.md"
      - "docs/**"
      - "wiki/**"
      - "scripts/sync_project_metadata.py"
      - "scripts/gen_datapack.py"
      - "scripts/import_v09_design.py"
      - "scripts/build_content_graph.py"
      - "scripts/check_resource_integrity.py"
      - "scripts/check_github_text_encoding.py"
      - "scripts/gen_pages_catalog.py"
      - "scripts/check_release_timestamp.py"
      - "scripts/check_m3_foundation.py"
      - "src/main/java/top/aurora/lordofmysteries/registry/ModItems.java"
      - "src/main/java/top/aurora/lordofmysteries/registry/ModBlocks.java"
      - "src/main/java/top/aurora/lordofmysteries/registry/ModEntities.java"
      - "src/main/resources/assets/lord_of_mysteries/lang/*.json"
      - "build.gradle"
      - ".github/workflows/docs-consistency.yml"
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  verify:
    name: Verify version and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify generated metadata
        run: python3 scripts/sync_project_metadata.py --check

      - name: Verify release timestamp drift
        run: python3 scripts/check_release_timestamp.py

      - name: Require metadata in final push commit
        if: github.event_name == 'push' && github.actor != 'dependabot[bot]'
        run: python3 scripts/check_release_timestamp.py --require-head

      - name: Verify generated Pages catalog
        run: python3 scripts/gen_pages_catalog.py --check

      - name: Verify M3 foundation contract
        run: python3 scripts/check_m3_foundation.py

      - name: Verify generated datapack
        run: python3 scripts/gen_datapack.py --check

      - name: Verify v0.9 design source set
        run: python3 scripts/import_v09_design.py --check

      - name: Verify v0.9 content graph
        run: python3 scripts/build_content_graph.py

      - name: Verify resource integrity
        run: python3 scripts/check_resource_integrity.py

      - name: Verify GitHub Issue text encoding
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_github_text_encoding.py

      - name: Validate JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          files = list(Path("src/main/resources").rglob("*.json"))
          files.extend(Path("src/generated/resources").rglob("*.json"))
          files.append(Path("project-status.json"))
          files.append(Path("roadmap.json"))
          for path in files:
              with path.open(encoding="utf-8") as stream:
                  json.load(stream)
          print(f"Validated {len(files)} JSON files")
          PY

      - name: Validate JavaScript syntax
        run: |
          node --check docs/assets/project-meta.js
          node --check docs/assets/wiki-data.js
          node --check docs/assets/catalog-data.js
          node --check docs/assets/wiki.js
