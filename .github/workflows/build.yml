name: Build

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "src/**"
      - "gradle/**"
      - "project-status.json"
      - "scripts/sync_project_metadata.py"
      - "scripts/gen_datapack.py"
      - "scripts/run_server_smoke.py"
      - "scripts/check_m1_playability.py"
      - "docs/m1-playability-contract.json"
      - "docs/pathways_master.csv"
      - "docs/recipes_master.csv"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "src/**"
      - "gradle/**"
      - "project-status.json"
      - "scripts/sync_project_metadata.py"
      - "scripts/gen_datapack.py"
      - "scripts/run_server_smoke.py"
      - "scripts/check_m1_playability.py"
      - "docs/m1-playability-contract.json"
      - "docs/pathways_master.csv"
      - "docs/recipes_master.csv"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Forge mod
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify project metadata
        run: python3 scripts/sync_project_metadata.py --check

      - name: Verify generated datapack
        run: python3 scripts/gen_datapack.py --check

      - name: Verify M1 playability contract
        run: python3 scripts/check_m1_playability.py

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew -Dnet.minecraftforge.gradle.check.certs=false --stacktrace clean build

      - name: Dedicated server smoke test
        run: python3 scripts/run_server_smoke.py --timeout 180

      - name: Upload mod jars
        uses: actions/upload-artifact@v7
        with:
          name: lord-of-mysteries-jars
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore
