name: Build

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "src/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "src/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Forge mod
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew -Dnet.minecraftforge.gradle.check.certs=false --stacktrace clean build

      - name: Upload mod jars
        uses: actions/upload-artifact@v4
        with:
          name: lord-of-mysteries-jars
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore
