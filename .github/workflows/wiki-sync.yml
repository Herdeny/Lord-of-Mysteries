name: Sync GitHub Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - "wiki/**"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Publish wiki source
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Clone GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            "$RUNNER_TEMP/project-wiki"

      - name: Synchronize Markdown pages
        run: |
          find "$RUNNER_TEMP/project-wiki" -maxdepth 1 -type f -name '*.md' -delete
          cp wiki/*.md "$RUNNER_TEMP/project-wiki/"

      - name: Commit and push when changed
        working-directory: ${{ runner.temp }}/project-wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki is already synchronized."
            exit 0
          fi
          git commit -s -m "docs: sync wiki from main ${GITHUB_SHA::7}"
          git push origin HEAD:master
