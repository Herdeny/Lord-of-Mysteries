changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: "Breaking changes"
      labels:
        - breaking-change
    - title: "Features"
      labels:
        - enhancement
        - content
    - title: "Fixes"
      labels:
        - bug
    - title: "Documentation"
      labels:
        - documentation
    - title: "Dependencies"
      labels:
        - dependencies
    - title: "Other changes"
      labels:
        - "*"

